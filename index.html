
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Stream - Professional Reading Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0d1117;
            color: #e6edf3;
            margin: 0;
            overflow: hidden;
        }

        /* Setup Screen */
        .setup-screen {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background: radial-gradient(circle at top right, #161b22 0%, #0d1117 100%);
        }

        .input-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 16px;
            padding: 2rem;
            width: 100%;
            max-width: 650px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        textarea {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 10px;
            color: #e6edf3;
            padding: 1.2rem;
            width: 100%;
            height: 220px;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
            resize: none;
        }

        textarea:focus { 
            border-color: #58a6ff;
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.1);
        }

        /* Custom Speed Slider Styling */
        .speed-slider {
            -webkit-appearance: none;
            height: 4px;
            background: #30363d;
            border-radius: 5px;
            outline: none;
        }

        .speed-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: #58a6ff;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(88, 166, 255, 0.4);
        }

        /* Countdown Overlay */
        #countdown-overlay {
            position: fixed;
            inset: 0;
            background: #0d1117;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
            font-size: 10rem;
            font-weight: 700;
            color: #58a6ff;
        }

        /* Stream Interface */
        #stream-screen {
            display: none;
            height: 100vh;
            flex-direction: column;
            max-width: 950px;
            margin: 0 auto;
            position: relative;
        }

        #scroll-area {
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            padding: 110px 2.5rem 80px 2.5rem; 
            scroll-behavior: smooth;
            height: 100%;
        }

        #scroll-area::-webkit-scrollbar { width: 4px; }
        #scroll-area::-webkit-scrollbar-thumb { background: #30363d; border-radius: 10px; }

        .message-bubble { 
            line-height: 1.9; 
            font-size: 1.4rem; 
            white-space: pre-wrap;
            margin-bottom: 32px;
            color: #f0f6fc;
        }

        .cursor {
            display: inline-block;
            width: 12px;
            height: 24px;
            background: #58a6ff;
            margin-left: 6px;
            vertical-align: middle;
            animation: blink 0.9s infinite;
        }

        @keyframes blink { 50% { opacity: 0; } }

        /* Header Navigation */
        .header-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1.5rem;
            background: rgba(13, 17, 23, 0.85);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid #30363d;
            z-index: 50;
        }

        .btn-action {
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-pause { background: #d29922; color: #0d1117; }
        .btn-stop { background: rgba(248, 81, 73, 0.1); color: #f85149; border: 1px solid rgba(248, 81, 73, 0.4); }

        .brand-logo {
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: -0.5px;
            background: linear-gradient(90deg, #58a6ff, #bc8cff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Live Speed Controller and Status Box */
        .live-speed-box {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.03);
            padding: 6px 12px;
            border-radius: 30px;
            border: 1px solid #30363d;
        }

        .status-container {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 30px;
            border: 1px solid #30363d;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            transition: all 0.3s ease;
        }
    </style>
</head>
<body>

    <!-- Setup Screen -->
    <div id="setup-screen" class="setup-screen">
        <div class="input-card">
            <h1 class="text-2xl font-bold mb-1 text-white">Visual Stream</h1>
            <p class="mb-6 text-slate-400 text-sm">Professional Content Visualization System</p>
            
            <label class="block text-xs font-semibold text-slate-500 uppercase mb-2 tracking-wider">Source Content</label>
            <textarea id="user-input" placeholder="Paste your text here..."></textarea>
            
            <div class="flex items-center justify-between mt-8">
                <span class="text-[11px] text-slate-500">Live Status & Speed Controls available in-stream</span>
                <button class="bg-[#238636] hover:bg-[#2ea043] px-10 py-3 rounded-lg font-bold text-white transition-all transform active:scale-95 shadow-lg" onclick="startCountdown()">
                    Initialize Stream
                </button>
            </div>
        </div>
    </div>

    <div id="countdown-overlay"></div>

    <div id="stream-screen">
        <header class="header-nav">
            <div class="flex items-center gap-3 md:gap-6">
                <div class="brand-logo hidden sm:block">Visual Stream</div>
                
                <!-- Status Indicator (Back Again) -->
                <div class="status-container">
                    <div id="status-dot" class="status-dot bg-[#238636] shadow-[0_0_8px_#238636]"></div>
                    <span id="status-text" class="text-[10px] uppercase font-bold tracking-widest text-slate-400">Active Stream</span>
                </div>

                <!-- Live Speed Control -->
                <div class="live-speed-box">
                    <span class="text-[10px] uppercase font-bold text-slate-500">Speed</span>
                    <input type="range" id="live-speed" class="speed-slider w-16 md:w-24" min="1" max="5" value="3" step="1">
                    <span id="speed-indicator" class="text-[10px] font-bold text-[#58a6ff] min-w-[35px]">Normal</span>
                </div>
            </div>

            <div class="flex gap-2">
                <button id="pause-btn" class="btn-action btn-pause" onclick="togglePause()">Pause</button>
                <button class="btn-action btn-stop" onclick="stopStream()">Reset</button>
            </div>
        </header>

        <div id="scroll-area">
            <div style="flex-grow: 1;"></div>
            <div id="messages-container"></div>
        </div>
    </div>

    <script>
        const setupScreen = document.getElementById('setup-screen');
        const countdownOverlay = document.getElementById('countdown-overlay');
        const streamScreen = document.getElementById('stream-screen');
        const scrollArea = document.getElementById('scroll-area');
        const messagesContainer = document.getElementById('messages-container');
        const userInput = document.getElementById('user-input');
        const pauseBtn = document.getElementById('pause-btn');
        const liveSpeed = document.getElementById('live-speed');
        const speedIndicator = document.getElementById('speed-indicator');
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');

        let contents = [];
        let isPaused = false;
        let isStopped = false;
        let baseDelay = 100; // ms

        // Map values to delays
        const delayMap = [220, 160, 100, 60, 25];
        const labelMap = ["Slowest", "Slow", "Normal", "Fast", "Fastest"];

        // Live Speed Change Handler
        liveSpeed.addEventListener('input', () => {
            const val = parseInt(liveSpeed.value);
            speedIndicator.textContent = labelMap[val - 1];
            baseDelay = delayMap[val - 1];
        });

        function startCountdown() {
            const rawText = userInput.value.trim();
            if (!rawText) return;

            contents = rawText.split('\n').filter(line => line.trim() !== "");
            isStopped = false;
            isPaused = false;
            
            setupScreen.style.display = 'none';
            countdownOverlay.style.display = 'flex';
            
            let count = 3;
            countdownOverlay.textContent = count;

            const timer = setInterval(() => {
                count--;
                if (count > 0) {
                    countdownOverlay.textContent = count;
                } else if (count === 0) {
                    countdownOverlay.textContent = "READY";
                } else {
                    clearInterval(timer);
                    countdownOverlay.style.display = 'none';
                    streamScreen.style.display = 'flex';
                    startStreaming();
                }
            }, 1000);
        }

        function togglePause() {
            isPaused = !isPaused;
            pauseBtn.innerHTML = isPaused ? "Resume" : "Pause";
            pauseBtn.style.background = isPaused ? "#238636" : "#d29922";
            
            // Light update logic
            if (isPaused) {
                statusDot.className = 'status-dot bg-[#d29922] shadow-[0_0_8px_#d29922]';
                statusText.textContent = "Stream Paused";
            } else {
                statusDot.className = 'status-dot bg-[#238636] shadow-[0_0_8px_#238636]';
                statusText.textContent = "Active Stream";
            }
        }

        function stopStream() {
            isStopped = true;
            location.reload();
        }

        async function startStreaming() {
            messagesContainer.innerHTML = "";
            for (let i = 0; i < contents.length; i++) {
                if (isStopped) break;
                await typeMessage(contents[i]);
            }
        }

        async function typeMessage(text) {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message-bubble';
            const textSpan = document.createElement('span');
            const cursorSpan = document.createElement('span');
            cursorSpan.className = 'cursor';
            
            messageDiv.appendChild(textSpan);
            messageDiv.appendChild(cursorSpan);
            messagesContainer.appendChild(messageDiv);

            for (let i = 0; i < text.length; i++) {
                if (isStopped) return;
                while (isPaused) {
                    await new Promise(r => setTimeout(r, 100));
                }

                textSpan.textContent += text.charAt(i);
                scrollArea.scrollTop = scrollArea.scrollHeight;
                
                await new Promise(r => setTimeout(r, Math.random() * (baseDelay/3) + baseDelay));
            }

            cursorSpan.remove();
            await new Promise(r => setTimeout(r, baseDelay * 12)); 
        }
    </script>
</body>
</html>
