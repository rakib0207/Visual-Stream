<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Stream - Professional Reading Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0d1117;
            color: #e6edf3;
            margin: 0;
            overflow: hidden;
        }

        /* Setup Screen */
        .setup-screen {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background: radial-gradient(circle at top right, #161b22 0%, #0d1117 100%);
        }

        .input-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 16px;
            padding: 2rem;
            width: 100%;
            max-width: 650px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            position: relative;
        }

        textarea {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 10px;
            color: #e6edf3;
            padding: 1.2rem;
            width: 100%;
            height: 220px;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
            resize: none;
            box-sizing: border-box;
        }

        textarea:focus {
            border-color: #58a6ff;
            box-shadow: 0 0 0 2px rgba(88, 166, 255, 0.1);
        }

        /* Clear Button (Plus Style) */
        .btn-clear {
            position: absolute;
            top: 2rem;
            right: 2rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #30363d;
            color: #8b949e;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-clear:hover {
            background: rgba(88, 166, 255, 0.1);
            color: #58a6ff;
            border-color: #58a6ff;
            transform: rotate(90deg);
        }

        /* Speed Slider */
        .speed-slider {
            -webkit-appearance: none;
            height: 4px;
            background: #30363d;
            border-radius: 5px;
            outline: none;
        }

        .speed-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: #58a6ff;
            border-radius: 50%;
            cursor: pointer;
        }

        /* Countdown */
        #countdown-overlay {
            position: fixed;
            inset: 0;
            background: #0d1117;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
            font-size: 10rem;
            font-weight: 700;
            color: #58a6ff;
        }

        /* Stream Interface */
        #stream-screen {
            display: none;
            height: 100vh;
            flex-direction: column;
            max-width: 950px;
            margin: 0 auto;
            position: relative;
        }

        /* Scroll Area Configuration */
        #scroll-area {
            flex-grow: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            padding: 120px 2.5rem 100px 2.5rem; 
            height: 100%;
            scroll-behavior: smooth;
        }

        #scroll-area::-webkit-scrollbar { width: 5px; }
        #scroll-area::-webkit-scrollbar-thumb { background: #30363d; border-radius: 10px; }

        #messages-container {
            display: flex;
            flex-direction: column;
        }

        .message-bubble { 
            line-height: 1.9; 
            font-size: 1.5rem; 
            white-space: pre-wrap;
            margin-bottom: 35px;
            color: #f0f6fc;
            transition: opacity 0.5s ease;
        }

        .cursor {
            display: inline-block;
            width: 3px;
            height: 1.3em;
            background: #58a6ff;
            margin-left: 6px;
            vertical-align: middle;
            animation: blink 0.9s infinite;
        }

        @keyframes blink { 50% { opacity: 0; } }

        /* Header UI */
        .header-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 85px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1.5rem;
            background: rgba(13, 17, 23, 0.95);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid #30363d;
            z-index: 100;
        }

        .brand-logo {
            font-weight: 800;
            font-size: 1.3rem;
            letter-spacing: -0.5px;
            background: linear-gradient(90deg, #58a6ff, #bc8cff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-container, .live-speed-box {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 14px;
            border-radius: 30px;
            border: 1px solid #30363d;
        }

        .status-dot { width: 10px; height: 10px; border-radius: 50%; }

        .btn-action {
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-pause { background: #d29922; color: #0d1117; }
        .btn-stop { background: rgba(248, 81, 73, 0.1); color: #f85149; border: 1px solid rgba(248, 81, 73, 0.4); }
    </style>
</head>
<body>

    <!-- Setup Screen -->
    <div id="setup-screen" class="setup-screen">
        <div class="input-card">
            <!-- New Script Button -->
            <button class="btn-clear" onclick="clearText()" title="New Script">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            </button>

            <h1 class="text-3xl font-extrabold mb-1 text-white">Visual Stream</h1>
            <p class="mb-6 text-slate-400 text-sm">Professional Top-Focus Reading System</p>
            
            <textarea id="user-input" placeholder="Paste your script here..."></textarea>
            
            <div class="flex items-center justify-between mt-8">
                <span class="text-[11px] text-slate-500 italic">Eye-level top-insertion mode</span>
                <button class="bg-[#238636] hover:bg-[#2ea043] px-10 py-3 rounded-lg font-bold text-white shadow-lg" onclick="startCountdown()">
                    Initialize Stream
                </button>
            </div>
        </div>
    </div>

    <div id="countdown-overlay"></div>

    <div id="stream-screen">
        <header class="header-nav">
            <div class="flex items-center gap-4 md:gap-6">
                <div class="brand-logo">Visual Stream</div>
                
                <div class="status-container">
                    <div id="status-dot" class="status-dot bg-[#238636] shadow-[0_0_10px_#238636]"></div>
                    <span id="status-text" class="text-[10px] uppercase font-bold tracking-widest text-slate-400">Live</span>
                </div>

                <!-- Progress Indicator -->
                <div class="status-container">
                    <span id="progress-text" class="text-[10px] font-bold text-slate-400">0 / 0</span>
                </div>

                <div class="live-speed-box hidden sm:flex">
                    <span class="text-[10px] uppercase font-bold text-slate-500">Speed</span>
                    <input type="range" id="live-speed" class="speed-slider w-24" min="1" max="5" value="3" step="1">
                    <span id="speed-indicator" class="text-[10px] font-bold text-[#58a6ff] min-w-[35px]">Normal</span>
                </div>
            </div>

            <div class="flex gap-3">
                <button id="pause-btn" class="btn-action btn-pause" onclick="togglePause()">Pause</button>
                <button class="btn-action btn-stop" onclick="stopStream()">Reset</button>
            </div>
        </header>

        <div id="scroll-area">
            <div id="messages-container"></div>
        </div>
    </div>

    <script>
        const setupScreen = document.getElementById('setup-screen');
        const countdownOverlay = document.getElementById('countdown-overlay');
        const streamScreen = document.getElementById('stream-screen');
        const messagesContainer = document.getElementById('messages-container');
        const scrollArea = document.getElementById('scroll-area');
        const userInput = document.getElementById('user-input');
        const pauseBtn = document.getElementById('pause-btn');
        const liveSpeed = document.getElementById('live-speed');
        const speedIndicator = document.getElementById('speed-indicator');
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');
        const progressText = document.getElementById('progress-text');

        let contents = [];
        let isPaused = false;
        let isStopped = false;
        let baseDelay = 100;

        const delayMap = [220, 160, 100, 60, 25];
        const labelMap = ["Slowest", "Slow", "Normal", "Fast", "Fastest"];

        // Load saved draft from localStorage
        userInput.value = localStorage.getItem('vs-draft') || '';

        // Save draft on every keystroke
        userInput.addEventListener('input', () => {
            localStorage.setItem('vs-draft', userInput.value);
        });

        liveSpeed.addEventListener('input', () => {
            const val = parseInt(liveSpeed.value);
            speedIndicator.textContent = labelMap[val - 1];
            baseDelay = delayMap[val - 1];
        });

        function clearText() {
            userInput.value = "";
            localStorage.removeItem('vs-draft');
            userInput.focus();
        }

        function startCountdown() {
            const rawText = userInput.value.trim();

            // Empty input validation
            if (!rawText) {
                userInput.style.borderColor = '#f85149';
                userInput.style.boxShadow = '0 0 0 2px rgba(248, 81, 73, 0.1)';
                userInput.placeholder = 'Please paste something first...';
                userInput.focus();
                setTimeout(() => {
                    userInput.style.borderColor = '#30363d';
                    userInput.style.boxShadow = 'none';
                    userInput.placeholder = 'Paste your script here...';
                }, 2000);
                return;
            }

            contents = rawText.split('\n').filter(line => line.trim() !== "");
            isStopped = false;
            isPaused = false;
            setupScreen.style.display = 'none';
            countdownOverlay.style.display = 'flex';
            let count = 3;
            countdownOverlay.textContent = count;
            const timer = setInterval(() => {
                count--;
                if (count > 0) countdownOverlay.textContent = count;
                else if (count === 0) countdownOverlay.textContent = "READY";
                else {
                    clearInterval(timer);
                    countdownOverlay.style.display = 'none';
                    streamScreen.style.display = 'flex';
                    startStreaming();
                }
            }, 1000);
        }

        function togglePause() {
            isPaused = !isPaused;
            pauseBtn.innerHTML = isPaused ? "Resume" : "Pause";
            pauseBtn.style.background = isPaused ? "#238636" : "#d29922";
            statusDot.className = isPaused ? 'status-dot bg-[#d29922] shadow-[0_0_10px_#d29922]' : 'status-dot bg-[#238636] shadow-[0_0_10px_#238636]';
            statusText.textContent = isPaused ? "Paused" : "Live";
        }

        function stopStream() {
            isStopped = true;
            isPaused = false;
            streamScreen.style.display = 'none';
            setupScreen.style.display = 'flex';
            messagesContainer.innerHTML = "";
            pauseBtn.innerHTML = "Pause";
            pauseBtn.style.background = "#d29922";
            progressText.textContent = "0 / 0";
            statusDot.className = 'status-dot bg-[#238636] shadow-[0_0_10px_#238636]';
            statusText.textContent = "Live";
        }

        async function startStreaming() {
            messagesContainer.innerHTML = "";
            for (let i = 0; i < contents.length; i++) {
                if (isStopped) break;
                progressText.textContent = `${i + 1} / ${contents.length}`;
                await typeMessage(contents[i]);
            }

            // Completion state
            if (!isStopped) {
                statusDot.className = 'status-dot bg-[#bc8cff] shadow-[0_0_10px_#bc8cff]';
                statusText.textContent = "Done";
                progressText.textContent = '✓ Complete';
            }
        }

        async function typeMessage(text) {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message-bubble';
            const textSpan = document.createElement('span');
            const cursorSpan = document.createElement('span');
            cursorSpan.className = 'cursor';
            messageDiv.appendChild(textSpan);
            messageDiv.appendChild(cursorSpan);

            messagesContainer.insertBefore(messageDiv, messagesContainer.firstChild);

            const bubbles = messagesContainer.getElementsByClassName('message-bubble');
            for (let b = 1; b < bubbles.length; b++) {
                bubbles[b].style.opacity = Math.max(0.15, 1 - (b * 0.3));
            }

            for (let i = 0; i < text.length; i++) {
                if (isStopped) return;
                while (isPaused) {
                    if (isStopped) return;
                    await new Promise(r => setTimeout(r, 100));
                }

                textSpan.textContent += text.charAt(i);

                // Smooth scroll using scrollIntoView
                cursorSpan.scrollIntoView({ behavior: 'smooth', block: 'center' });

                await new Promise(r => setTimeout(r, Math.random() * (baseDelay / 3) + baseDelay));
            }

            cursorSpan.remove();

            const extraWait = scrollArea.scrollTop > 0 ? baseDelay * 25 : baseDelay * 15;
            await new Promise(r => setTimeout(r, extraWait));

            scrollArea.scrollTo({ top: 0, behavior: 'smooth' });
            await new Promise(r => setTimeout(r, 500));
        }

        // Space bar shortcut for Pause / Resume
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && streamScreen.style.display === 'flex') {
                e.preventDefault();
                togglePause();
            }
        });
    </script>
</body>
</html>
